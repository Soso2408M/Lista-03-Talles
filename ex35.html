<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
let nome = prompt("Digite o nome do candidato:");

let portugues = Number(prompt("Nota de Português:"));
let matematica = Number(prompt("Nota de Matemática:"));
let gerais = Number(prompt("Nota de Conhecimentos Gerais:"));

// média
let media = (portugues + matematica + gerais) / 3;

// mostrar dados
document.write("Nome: " + nome + "<br>");
document.write("Português: " + portugues + "<br>");
document.write("Matemática: " + matematica + "<br>");
document.write("Conhecimentos Gerais: " + gerais + "<br>");
document.write("Média: " + media.toFixed(2) + "<br>");

// verificação
if (media > 7 && portugues >= 5 && matematica >= 5 && gerais >= 5) {
    document.write("Situação: Aprovado");
} else {
    document.write("Situação: Reprovado");
}
</script>
</body>
</html>
