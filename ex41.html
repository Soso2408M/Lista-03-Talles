<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valores</title>
</head>
<body>
    <script>
 nome = prompt("Nome do vendedor:");
var salarioMinimo = parseFloat(prompt("Valor do salário mínimo:"));
var carrosVendidos = parseFloat(prompt("Quantidade de carros vendidos:"));
var valorVendas = parseFloat(prompt("Valor total das vendas:"));

var salarioFixo = salarioMinimo * 2;
var comissaoCarros = carrosVendidos * 50;
var comissaoVendas = valorVendas * 0.05;

var salarioTotal = salarioFixo + comissaoCarros + comissaoVendas;

document.write("Vendedor: " + nome + "<br>");
document.write("Salário fixo: R$ " + salarioFixo + "<br>");
document.write("Comissão por carros: R$ " + comissaoCarros + "<br>");
document.write("Comissão 5% vendas: R$ " + comissaoVendas + "<br>");
document.write("Salário total: R$ " + salarioTotal);
</script>
</body>
</html>
