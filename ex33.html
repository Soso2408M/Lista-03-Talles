<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Média das Provas</title>
</head>
<body>
    <script>
        var prova1= 2;
        var prova2= 3;
        var prova3= 5;

        var total = (prova1 + prova2 + prova3);
        var média= total / 3;

        document.write("A média final é:" + média.toFixed(2));
    </script>
</body>
</html>
