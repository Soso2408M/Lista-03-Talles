<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício F1,F2 e F3</title>
</head>
<body>
    <script>
        var numero = parseFloat(prompt("Digite um número:"));

        if (numero <= 10) {
            document.write("O valor de F1 é de:" +numero + "É maior ou igual a 10" + "<br>");
        }if ( numero <= 100) {
            document.write("O valor de F2 é de:" + numero + "<br>" + "É menor ou igual a 100" + "<br>");
        } else {
            document.write("O valor de F3 é de:" + numero + "<br>");
        }
    </script>
</body>
</html>
