<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matérias</title>
</head>
<body>
    <script>
var nome = prompt("Digite o nome do Aluno:");

var portugûes = Number(prompt("Nota de Português:"));
var matemática = Number(prompt("Nota de Matemática:"));
var  conhecimentosgerais = Number(prompt("Nota de Conhecimentos Gerais:"));

// média
var média = (portugûes + matemática + conhecimentosgerais) / 3;

// mostrar dados
document.write("O nome da pessoa é:" + nome + "<br>");
document.write("Português: " + portugûes + "<br>");
document.write("Matemática: " + matemática + "<br>");
document.write("Conhecimentos Gerais: " + conhecimentosgerais + "<br>");
document.write("Média: " + média.toFixed(2) + "<br>");

// verificação
if (média > 7 & portugûes >= 5 & matemática >= 5 & conhecimentosgerais >= 5) {
    document.write("A situação deste aluno: Aprovado");
} else {
    document.write("A situação deste aluno: Reprovado");
}
</script>
</body>
</html>
