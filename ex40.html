<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materias de construção</title>
</head>
<body>
    <script>
var nome = prompt("Nome do cliente:");

var quantParafusos = parseFloat(prompt("Quantidade de parafusos:"));
var quantPorcas = parseFloat(prompt("Quantidade de porcas:"));
var quantArruelas = parseFloat(prompt("Quantidade de arruelas:"));

var precoParafuso = parseFloat(prompt("Preço unitário do parafuso:"));
var precoPorca = parseFloat(prompt("Preço unitário da porca:"));
var precoArruela = parseFloat(prompt("Preço unitário da arruela"));


var totalParafuso = quantParafusos * precoParafuso;
var totalPorca = quantPorcas * precoPorca;
var totalArruela = quantArruelas * precoArruela;


var desconto_Parafuso = totalParafuso * 0.20;
var desconto_Porca = totalPorca * 0.10;
var desconto_Arruela = totalArruela * 0.30;

var totalDesconto = desconto_Parafuso + desconto_Porca + desconto_Arruela;

var totalBruto = totalParafuso + totalPorca + totalArruela;
var totalPagar = totalBruto - totalDesconto;

document.write("Cliente: " + nome + "<br><br>");

document.write("Parafusos: " + quantParafusos + "<br>");
document.write("Porcas: " + quantPorcas + "<br>");
document.write("Arruelas: " + quantArruelas + "<br><br>");

document.write("Total de desconto: R$ " + totalDesconto + "<br>");
document.write("Total a pagar: R$ " + totalPagar);
</script>
</body>
</html>
