<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício F1,F2 e F3</title>
</head>
<body>
    <script>
        var n = parseFloat(prompt("Digite um número:"));

        if (n <= 10) {
            document.write("F1");
        } else if (n > 10 & n <= 12) {
            document.write("F2");
        } else {
            document.write("F3");
        }
    </script>
</body>
</html>
