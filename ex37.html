<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculos sobre Vida</title>
</head>
<body>
    <script>
var anos = Number(prompt("Digite sua idade em anos:"));
var meses = Number(prompt("Digite os meses:"));
var dias = Number(prompt("Digite os dias:"));

var totalDias = (anos * 365) + (meses * 30) + dias;

document.write("Você já viveu aproximadamente " + totalDias + " dias");
</script>
</body>
</html>
