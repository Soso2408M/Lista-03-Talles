<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matérias</title>
</head>
<body>
    <script>
var nome = prompt("Aluno:");
var português = parseFloat(prompt("Digite a nota de português:"));
var matemática = parseFloat(prompt("DIgite a nota em matemática:"));
var conhecimentosgerais = parseFloat(prompt("Digite a nota de conhecimentosgerais:"));
var total = português + matemática + conhecimentosgerais;
var média= total / 3;

document.write("O nome do aluno é:" + nome + "<br>");

document.write("Nota em Português: " + português + "<br>");

document.write("Nota em Matemática: " + matemática + "<br>");

document.write("Nota em Conhecimentos Gerais: " + conhecimentosgerais + "<br>");

document.write("Média: " + média.toFixed(2) + "<br>");

if (média > 8){
    if (português >= 10)
        if (matemática >= 5){
            if (conhecimentosgerais>=5) {
            document.write("A situação deste aluno: Aprovado");
            } else {
            document.write("A situação deste aluno: Reprovado");
            }
        }else{
            document.write("A situação do aluno é: Reprovado");
            }
        } else{
            document.write("A situção do aluno é de:Reprovado");
        }  
</script>
</body>
</html>
